name: dpad_nova
description: Samsung Tizen TV remote. No ads, no account, no subscription.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/DPad-Nova.png"
  adaptive_icon_background: "#1e1e2e"
  adaptive_icon_foreground: "assets/DPad-Nova.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/DPad-Nova.png
    - assets/mws_mark_dark.png
